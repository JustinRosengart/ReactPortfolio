deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
  script:
    - |
      # 1. Backup und Rechte setzen
      ssh $SERVER_USER@$SERVER_HOST "
        if [ -d $DEPLOY_PATH ]; then
          sudo cp -r $DEPLOY_PATH ${DEPLOY_PATH}_backup_$(date +%Y%m%d_%H%M%S) || true
        fi
        sudo mkdir -p $DEPLOY_PATH
        sudo chown -R $SERVER_USER:$SERVER_USER $DEPLOY_PATH
      "
    - |
      # 2. Dateien synchronisieren
      rsync -avz --delete \
        --exclude='.git*' \
        --exclude='node_modules' \
        --exclude='*.log' \
        ${BUILD_DIR}/ $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/
    - |
      # 3. Finale Konfiguration
      ssh $SERVER_USER@$SERVER_HOST "
        sudo chown -R www-data:www-data $DEPLOY_PATH
        sudo find $DEPLOY_PATH -type d -exec chmod 755 {} \;
        sudo find $DEPLOY_PATH -type f -exec chmod 644 {} \;
        sudo systemctl reload apache2
        echo 'Deployment erfolgreich abgeschlossen'
      "
  dependencies:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: $PRODUCTION_URL