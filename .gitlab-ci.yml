stages:
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  BUILD_DIR: "build"

# Cache node_modules for faster builds
cache:
  paths:
    - node_modules/
    - .npm/

build:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - ${BUILD_DIR}/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production_new:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
  script:
    - echo "=== NEUE PIPELINE VERSION ==="
    - echo "Wenn du das siehst, läuft die neue Pipeline!"
    - echo "SERVER_USER:" $SERVER_USER
    - echo "SERVER_HOST:" $SERVER_HOST
    - echo "DEPLOY_PATH:" $DEPLOY_PATH
    - echo "BUILD_DIR:" $BUILD_DIR
    - |
      if [ -d "${BUILD_DIR}" ]; then
        echo "BUILD_DIR Inhalt:"
        ls -la ${BUILD_DIR}/
      else
        echo "FEHLER: BUILD_DIR existiert nicht!"
        exit 1
      fi
    - |
      echo "=== SSH TEST ==="
      ssh $SERVER_USER@$SERVER_HOST "
        echo 'SSH erfolgreich als:' \$(whoami)
        echo 'Sudo-Rechte verfügbar:'
        sudo -l | grep -v 'may not run sudo' | head -5 || echo 'Keine sudo-Rechte gefunden'
      "
    - |
      echo "=== PFAD SETUP ==="
      ssh $SERVER_USER@$SERVER_HOST "
        echo 'Deploy Path: $DEPLOY_PATH'
        if [ -z '$DEPLOY_PATH' ]; then
          echo 'FEHLER: DEPLOY_PATH ist leer!'
          exit 1
        fi
        sudo mkdir -p $DEPLOY_PATH
        sudo chown -R $SERVER_USER:$SERVER_USER $DEPLOY_PATH
        ls -la \$(dirname $DEPLOY_PATH)
      "
    - |
      echo "=== DEPLOYMENT ==="
      rsync -avz --delete \
        --exclude='.git*' \
        --exclude='node_modules' \
        ${BUILD_DIR}/ $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/
    - |
      echo "=== FINALE SETUP ==="
      ssh $SERVER_USER@$SERVER_HOST "
        sudo chown -R www-data:www-data $DEPLOY_PATH
        sudo find $DEPLOY_PATH -type d -exec chmod 755 {} \;
        sudo find $DEPLOY_PATH -type f -exec chmod 644 {} \;
        sudo systemctl reload apache2
        echo 'Deployment abgeschlossen!'
      "
  dependencies:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: $PRODUCTION_URL