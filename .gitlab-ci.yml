stages:
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

build:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  script:
    - echo "Logging in to GitLab Container Registry..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "Building Docker image $IMAGE_TAG"
    - docker build --build-arg CI=false --build-arg REACT_APP_SUPABASE_URL="$REACT_APP_SUPABASE_URL" --build-arg REACT_APP_SUPABASE_ANON_KEY="$REACT_APP_SUPABASE_ANON_KEY" -t $IMAGE_TAG .
    - echo "Pushing Docker image to registry..."
    - docker push $IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
    - scp docker-compose.yml $SERVER_USER@$SERVER_HOST:/var/www/$PRODUCTION_URL/docker-compose.yml
    - scp nginx.conf $SERVER_USER@$SERVER_HOST:/var/www/$PRODUCTION_URL/nginx.conf
  script:
    - |
      ssh $SERVER_USER@$SERVER_HOST "
        cd /var/www/$PRODUCTION_URL &&
        echo 'Logging in to GitLab Container Registry...' &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        echo 'Exporting environment variables for docker-compose...' &&
        export CI_REGISTRY_IMAGE=${CI_REGISTRY_IMAGE} &&
        export CI_COMMIT_SHORT_SHA=${CI_COMMIT_SHORT_SHA} &&
        echo 'Pulling the latest image...' &&
        docker compose pull &&
        echo 'Restarting the service...' &&
        docker compose up -d &&
        echo 'Deployment successful!'
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: https://$PRODUCTION_URL