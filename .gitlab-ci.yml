stages:
  - build
  - optimize
  - deploy

variables:
  NODE_VERSION: "20"
  BUILD_DIR: "build"

cache:
  paths:
    - node_modules/
    - .npm/

build:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - ${BUILD_DIR}/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

compress_images:
  stage: optimize
  image: alpine:latest
  before_script:
    - apk add --no-cache jpegoptim optipng nodejs npm
    - npm install -g svgo
  script:
    - echo "Suche und komprimiere Bilder im Build-Verzeichnis..."
    - |
      find ${BUILD_DIR} -type f -regex ".*\.\(jpg\|jpeg\|png\|svg\)" -print0 | while IFS= read -r -d '' file; do
        echo "Komprimiere: $file"
        case "$file" in
          *.jpg|*.jpeg)
            jpegoptim --strip-all --all-progressive "$file"
            ;;
          *.png)
            optipng -o7 -strip all "$file"
            ;;
          *.svg)
            svgo "$file"
            ;;
        esac
      done
    - echo "Kompression abgeschlossen."
  artifacts:
    paths:
      - ${BUILD_DIR}/
    expire_in: 1 hour
  dependencies:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
  script:
    - |
      # Backup des aktuellen Deployments erstellen
      ssh $SERVER_USER@$SERVER_HOST "
        if [ -d '$DEPLOY_PATH' ]; then
          sudo /bin/cp -r $DEPLOY_PATH ${DEPLOY_PATH}_backup_\$(date +%Y%m%d_%H%M%S)
          echo 'Backup erstellt'
        fi
      "
    - |
      # Deployment-Verzeichnis vorbereiten
      ssh $SERVER_USER@$SERVER_HOST "
        sudo /bin/mkdir -p $DEPLOY_PATH
        # Dieser chown ist temporär, damit rsync schreiben kann
        sudo /bin/chown -R $SERVER_USER:$SERVER_USER $DEPLOY_PATH
        echo 'Deploy-Verzeichnis vorbereitet'
      "
    - |
      # Dateien synchronisieren
      rsync -avz --delete \
        --exclude='.git*' \
        --exclude='node_modules' \
        ${BUILD_DIR}/ $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/
      
      echo "Dateien erfolgreich übertragen"
    - |
      # Finale Konfiguration mit absoluten Pfaden
      ssh $SERVER_USER@$SERVER_HOST "
        sudo /bin/chown -R www-data:www-data $DEPLOY_PATH
        sudo /bin/chmod -R 755 $DEPLOY_PATH
        sudo /bin/systemctl reload apache2
      
        if sudo /bin/systemctl is-active --quiet apache2; then
          echo '✅ Deployment erfolgreich - Apache läuft'
        else
          echo '❌ Apache-Problem!'
          exit 1
        fi
      "
  dependencies:
    - compress_images
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: $PRODUCTION_URL

rollback_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $SERVER_USER@$SERVER_HOST "
        # Neuestes Backup finden
        BACKUP=\$(ls -td ${DEPLOY_PATH}_backup_* 2>/dev/null | head -1)
      
        if [ -z \"\$BACKUP\" ]; then
          echo 'Kein Backup gefunden!'
          exit 1
        fi
      
        echo \"Rollback zu: \$BACKUP\"
      
        # Rollback durchführen mit absoluten Pfaden
        sudo /bin/mv $DEPLOY_PATH ${DEPLOY_PATH}_broken_\$(date +%Y%m%d_%H%M%S)
        sudo /bin/mv \"\$BACKUP\" $DEPLOY_PATH
        sudo /bin/chown -R www-data:www-data $DEPLOY_PATH
        sudo /bin/chmod -R 755 $DEPLOY_PATH
        sudo /bin/systemctl reload apache2
      
        echo '✅ Rollback erfolgreich abgeschlossen'
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production